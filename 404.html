<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#06141b">
<title>Turn-Based Games - not found</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #cfe9ec; background: linear-gradient(180deg, #0a1f2b, #06141b);
  }
  a { color: #34e7c4; }
</style>
</head>
<body>
<p>Page not found - heading back to the game client... <a id="fallback" href="/turn_based_games/public/">tap here if nothing happens</a>.</p>
<script>
  // GitHub Pages serves this for any unknown path on the project site.
  // The first path segment is the repo name; forward to its public/ client.
  var parts = window.location.pathname.split('/').filter(Boolean);
  var base = parts.length ? '/' + parts[0] + '/' : '/';
  var target = base + 'public/';
  document.getElementById('fallback').href = target;
  window.location.replace(target);
</script>
</body>
</html>
