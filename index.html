<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#06141b">
<title>Turn-Based Games</title>
<meta http-equiv="refresh" content="0; url=public/">
<style>
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #cfe9ec; background: linear-gradient(180deg, #0a1f2b, #06141b);
  }
  a { color: #34e7c4; }
</style>
</head>
<body>
<p>Loading the game client... <a id="fallback" href="public/">tap here if nothing happens</a>.</p>
<script>
  // Single landing page lives at public/ (shared with the Node server).
  // Forward immediately and keep any launch params like ?mode=computer&game=x.
  var target = 'public/' + window.location.search + window.location.hash;
  document.getElementById('fallback').href = target;
  window.location.replace(target);
</script>
</body>
</html>
